<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LSF Pickleball League Tracker</title>
  <style>
    :root {
      --bg: #090909;
      --card: #171717;
      --ink: #f8fafc;
      --muted: #cbd5e1;
      --line: #343434;
      --accent: #ff7a00;
      --accent-dark: #cc6200;
      --gold: rgba(255, 122, 0, 0.22);
      --shadow: 0 14px 34px rgba(0, 0, 0, 0.38);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      background: linear-gradient(135deg, #000000, #ff7a00);
      color: white;
      padding: 34px 22px;
    }
    .wrap { max-width: 1180px; margin: 0 auto; }
    h1 { margin: 0 0 8px; font-size: clamp(28px, 4vw, 44px); letter-spacing: -0.04em; }
    .subtitle { margin: 0; color: rgba(255,255,255,.82); font-size: 16px; }
    main { padding: 24px 22px 50px; }
    .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 18px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 18px;
    }
    .span-12 { grid-column: span 12; }
    .span-7 { grid-column: span 7; }
    .span-5 { grid-column: span 5; }
    .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 18px; }
    .kpi { background: #101010; border: 1px solid var(--line); border-radius: 16px; padding: 14px; }
    .kpi .label { color: var(--muted); font-size: 13px; margin-bottom: 6px; }
    .kpi .value { font-size: 26px; font-weight: 800; letter-spacing: -0.03em; color: var(--accent); }
    h2 { margin: 0 0 14px; font-size: 21px; letter-spacing: -0.02em; }
    .table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 14px; }
    table { width: 100%; border-collapse: collapse; background: #101010; min-width: 760px; }
    th, td { padding: 10px 11px; border-bottom: 1px solid var(--line); text-align: left; font-size: 14px; color: var(--ink); }
    th { background: #222; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: #ffb366; position: sticky; top: 0; }
    tr:last-child td { border-bottom: none; }
    .rank { font-weight: 900; }
    .pill { display: inline-block; padding: 4px 8px; border-radius: 999px; background: rgba(255,122,0,.18); color: #ffb366; font-weight: 800; font-size: 12px; }
    .gold { background: var(--gold); }
    .muted { color: var(--muted); }
    .note { margin: 0 0 18px; color: var(--muted); }
    @media (max-width: 900px) {
      .span-7, .span-5 { grid-column: span 12; }
      .kpis { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 560px) {
      .kpis { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>LSF Pickleball League Tracker</h1>
    <p class="subtitle">Daily winners and overall standings update from the published match file.</p>
  </div>
</header>
<main class="wrap">
  <section class="kpis" id="kpis"></section>
  <section class="grid">
    <div class="card span-5">
      <h2>Winner by Date</h2>
      <div class="table-wrap"><table id="dailyTable"></table></div>
    </div>
    <div class="card span-7">
      <h2>Overall Standings</h2>
      <div class="table-wrap"><table id="standingsTable"></table></div>
    </div>
    <div class="card span-12">
      <h2>Match Log</h2>
      <p class="note">This page is view-only. To update standings, replace this file in GitHub with the latest version.</p>
      <div class="table-wrap"><table id="matchTable"></table></div>
    </div>
  </section>
</main>
<script>
const matches = [{"date":"2026-06-01","p1":"Brandon F","p2":"Giacomo C","p3":"Sarah B","p4":"Coach Mitch","score1":11,"score2":3},{"date":"2026-06-01","p1":"Jordanna L","p2":"Devin D","p3":"Ahmaad L","p4":"Sophia M","score1":11,"score2":3},{"date":"2026-06-01","p1":"Devin D","p2":"Brandon F","p3":"Giacomo C","p4":"Jordanna L","score1":11,"score2":3},{"date":"2026-06-01","p1":"Coach Mitch","p2":"Sophia M","p3":"Ahmaad L","p4":"Sarah B","score1":11,"score2":3},{"date":"2026-06-01","p1":"Brandon F","p2":"Jordanna L","p3":"Devin D","p4":"Giacomo C","score1":11,"score2":2},{"date":"2026-06-01","p1":"Coach Mitch","p2":"Ahmaad L","p3":"Sophia M","p4":"Sarah B","score1":11,"score2":7},{"date":"2026-06-01","p1":"Jordanna L","p2":"Devin D","p3":"Brandon F","p4":"Giacomo C","score1":11,"score2":9},{"date":"2026-06-01","p1":"Ahmaad L","p2":"Brandon F","p3":"Giacomo C","p4":"Sophia M","score1":11,"score2":7},{"date":"2026-06-01","p1":"Jordanna L","p2":"Devin D","p3":"Sarah B","p4":"Coach Mitch","score1":11,"score2":8},{"date":"2026-06-01","p1":"Brandon F","p2":"Sophia M","p3":"Giacomo C","p4":"Ahmaad L","score1":11,"score2":1},{"date":"2026-06-01","p1":"Devin D","p2":"Giacomo C","p3":"Ahmaad L","p4":"Sophia M","score1":11,"score2":5},{"date":"2026-06-01","p1":"Coach Mitch","p2":"Jordanna L","p3":"Brandon F","p4":"Sarah B","score1":11,"score2":4},{"date":"2026-06-01","p1":"Devin D","p2":"Sophia M","p3":"Giacomo C","p4":"Ahmaad L","score1":11,"score2":7},{"date":"2026-06-06","p1":"Brian A","p2":"Srisupen A","p3":"Ann Z","p4":"Coach Chase","score1":13,"score2":11},{"date":"2026-06-06","p1":"Brian A","p2":"Ann Z","p3":"Coach Chase","p4":"Srisupen A","score1":12,"score2":10},{"date":"2026-06-06","p1":"Coach Chase","p2":"Ann Z","p3":"Brian A","p4":"Srisupen A","score1":12,"score2":10},{"date":"2026-06-06","p1":"Coach Chase","p2":"Srisupen A","p3":"Ann Z","p4":"Brian A","score1":7,"score2":1}];
function fmtDate(dateString) {
  const [y,m,d] = dateString.split('-').map(Number);
  return new Date(y, m-1, d).toLocaleDateString(undefined, {month:'short', day:'numeric', year:'numeric'});
}
function cleanName(name) { return (name || '').trim(); }
function blankStanding(name) { return {name, points:0, matches:0, wins:0, losses:0, pointDiff:0}; }
function calculateStandings() {
  const table = new Map();
  for (const m of matches) {
    const team1 = [m.p1, m.p2].map(cleanName);
    const team2 = [m.p3, m.p4].map(cleanName);
    const s1 = Number(m.score1) || 0;
    const s2 = Number(m.score2) || 0;
    const team1Won = s1 > s2;
    const team2Won = s2 > s1;
    for (const name of team1) {
      if (!name) continue;
      if (!table.has(name)) table.set(name, blankStanding(name));
      const row = table.get(name);
      row.points += s1; row.matches += 1; row.pointDiff += s1 - s2;
      if (team1Won) row.wins += 1; else if (team2Won) row.losses += 1;
    }
    for (const name of team2) {
      if (!name) continue;
      if (!table.has(name)) table.set(name, blankStanding(name));
      const row = table.get(name);
      row.points += s2; row.matches += 1; row.pointDiff += s2 - s1;
      if (team2Won) row.wins += 1; else if (team1Won) row.losses += 1;
    }
  }
  return [...table.values()].sort((a,b) => b.points - a.points || b.wins - a.wins || b.pointDiff - a.pointDiff || a.name.localeCompare(b.name));
}
function calculateDailyWinners() {
  const byDate = new Map();
  for (const m of matches) {
    if (!byDate.has(m.date)) byDate.set(m.date, new Map());
    const map = byDate.get(m.date);
    for (const [name, pts] of [[m.p1,m.score1],[m.p2,m.score1],[m.p3,m.score2],[m.p4,m.score2]]) {
      const cleaned = cleanName(name);
      if (!cleaned) continue;
      map.set(cleaned, (map.get(cleaned) || 0) + (Number(pts) || 0));
    }
  }
  return [...byDate.entries()].sort(([a],[b]) => a.localeCompare(b)).map(([date, map]) => {
    const rows = [...map.entries()].map(([name, points]) => ({name, points})).sort((a,b) => b.points - a.points || a.name.localeCompare(b.name));
    const topPoints = rows[0]?.points || 0;
    const winners = rows.filter(r => r.points === topPoints).map(r => r.name).join(', ');
    return {date, winners, points: topPoints, players: rows.length};
  });
}
function renderKpis() {
  const standings = calculateStandings();
  const days = calculateDailyWinners();
  const top = standings[0];
  document.getElementById('kpis').innerHTML = `
    <div class="kpi"><div class="label">Matches Entered</div><div class="value">${matches.length}</div></div>
    <div class="kpi"><div class="label">League Dates</div><div class="value">${days.length}</div></div>
    <div class="kpi"><div class="label">Players</div><div class="value">${standings.length}</div></div>
    <div class="kpi"><div class="label">Overall Leader</div><div class="value" style="font-size:20px">${top ? top.name : '—'}</div></div>`;
}
function renderStandings() {
  const standings = calculateStandings();
  document.getElementById('standingsTable').innerHTML = `
    <thead><tr><th>Rank</th><th>Player</th><th>Overall Score</th></tr></thead>
    <tbody>${standings.map((r, i) => `<tr class="${i===0?'gold':''}"><td class="rank">${i+1}</td><td>${i===0?'🐐 ':''}${r.name}</td><td><strong>${r.points}</strong></td></tr>`).join('')}</tbody>`;
}
function renderDaily() {
  const days = calculateDailyWinners();
  document.getElementById('dailyTable').innerHTML = `
    <thead><tr><th>Date</th><th>Winner</th><th>Points</th><th>Players</th></tr></thead>
    <tbody>${days.map(d => `<tr><td>${fmtDate(d.date)}</td><td><span class="pill">${d.winners}</span></td><td><strong>${d.points}</strong></td><td>${d.players}</td></tr>`).join('')}</tbody>`;
}
function renderMatches() {
  const sorted = [...matches].sort((a,b) => a.date.localeCompare(b.date));
  document.getElementById('matchTable').innerHTML = `
    <thead><tr><th>Date</th><th>Team 1</th><th>Team 2</th><th>Score</th><th>Winning Team</th></tr></thead>
    <tbody>${sorted.map(m => {
      const s1 = Number(m.score1), s2 = Number(m.score2);
      const winner = s1 === s2 ? 'Tie' : s1 > s2 ? `${m.p1} / ${m.p2}` : `${m.p3} / ${m.p4}`;
      return `<tr><td>${fmtDate(m.date)}</td><td>${m.p1} / ${m.p2}</td><td>${m.p3} / ${m.p4}</td><td><strong>${s1}-${s2}</strong></td><td>${winner}</td></tr>`;
    }).join('')}</tbody>`;
}
renderKpis();
renderDaily();
renderStandings();
renderMatches();
</script>
</body>
</html>
